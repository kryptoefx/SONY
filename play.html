<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Famcode - Player</title>
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; height: 100vh; overflow: hidden; font-family: -apple-system, sans-serif; }
.shaka-video-container { width: 100%; height: 100%; }
video { width: 100%; height: 100%; background: #000; }

#loading {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: #000; color: #fff; font-size: 1.1rem; gap: 12px;
}
#loading .spinner {
  width: 28px; height: 28px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: #ef4444;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#error {
  display: none; position: fixed; inset: 0; z-index: 101;
  background: #000; color: #fff;
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
#error h2 { font-size: 1.3rem; color: #ef4444; }
#error p { color: #888; font-size: 0.95rem; max-width: 400px; text-align: center; }
#error button {
  background: #ef4444; color: #fff; border: none;
  padding: 10px 28px; border-radius: 8px; cursor: pointer; font-size: 0.95rem;
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div>Loading stream...</div>
<div id="error">
  <h2>Stream Unavailable</h2>
  <p>Could not load the stream. It may have ended or is not yet available.</p>
  <button onclick="location.reload()">Retry</button>
</div>

<div data-shaka-player-container class="shaka-video-container">
  <video id="video" data-shaka-player playsinline autoplay></video>
</div>

<script>
const DATA_URL = "https://raw.githubusercontent.com/doctor-8trange/zyphora/refs/heads/main/data/sony.json";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function getStreamInfo() {
  const matchIdPart = id.split("_")[0];
  const langPart = id.split("_")[1];

  const resp = await fetch(DATA_URL);
  const data = await resp.json();

  const matches = Array.isArray(data.matches) ? data.matches : [];
  const match = matches.find(
    m => String(m.match_id) === matchIdPart &&
         String(m.language || "").toUpperCase() === langPart
  );

  if (!match || !match.auto_streams || !match.auto_streams.length) return null;

  const streamObj = match.auto_streams[0];
  return {
    m3u8Text: streamObj.auto,       // raw M3U8 master playlist text
    cookie: streamObj.cookie || ""   // cookie/token if present
  };
}

/**
 * The "auto" field contains raw M3U8 master playlist TEXT (not a URL).
 * We create a blob URL from it so Shaka can load it as a master manifest
 * with all quality variants available for switching.
 */
function createMasterBlobUrl(m3u8Text) {
  const blob = new Blob([m3u8Text], { type: "application/vnd.apple.mpegurl" });
  return URL.createObjectURL(blob);
}

const video = document.getElementById("video");
const loadingEl = document.getElementById("loading");
const errorEl = document.getElementById("error");
let player;

function showError() {
  loadingEl.style.display = "none";
  errorEl.style.display = "flex";
}

async function initializePlayer() {
  try {
    const streamInfo = await getStreamInfo();
    if (!streamInfo || !streamInfo.m3u8Text) { showError(); return; }

    player = new shaka.Player();
    await player.attach(video);

    const container = document.querySelector("[data-shaka-player-container]");
    const ui = new shaka.ui.Overlay(player, container, video);

    ui.configure({
      addBigPlayButton: false,
      overflowMenuButtons: [
        "quality", "language", "playback_rate", "captions",
        "picture_in_picture", "airplay", "loop"
      ]
    });

    player.configure({
      streaming: {
        bufferingGoal: 10,
        rebufferingGoal: 2,
        bufferBehind: 30,
        retryParameters: {
          timeout: 30000,
          maxAttempts: 3,
          baseDelay: 1000,
          backoffFactor: 2,
          fuzzFactor: 0.5
        }
      },
      abr: { enabled: true }
    });

    // Add CORS headers to all network requests
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers["Origin"] = "https://www.fancode.com";
      request.headers["Referer"] = "https://www.fancode.com/";
    });

    // Create a blob URL from the raw M3U8 text so Shaka treats it as a master playlist
    const masterUrl = createMasterBlobUrl(streamInfo.m3u8Text);

    await player.load(masterUrl, undefined, "application/x-mpegurl");
    loadingEl.style.display = "none";

    video.muted = false;
    video.autoplay = true;
    video.controls = false;

    const tryPlay = async () => {
      try {
        await video.play();
      } catch (e) {
        video.muted = true;
        try { await video.play(); } catch (_) {}
      }
    };

    if (video.readyState >= 2) {
      await tryPlay();
    } else {
      video.addEventListener("canplay", tryPlay, { once: true });
    }

  } catch (err) {
    console.error("Player error:", err);

    // Fallback: try picking the highest quality stream URL directly
    try {
      const streamInfo = await getStreamInfo();
      if (!streamInfo) { showError(); return; }

      // Parse individual stream URLs from the M3U8 text
      const lines = streamInfo.m3u8Text.split("\n");
      const streamUrls = lines.filter(l => l.startsWith("http"));

      if (streamUrls.length > 0) {
        // Use the last URL (typically highest quality)
        const fallbackUrl = streamUrls[streamUrls.length - 1];

        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          // Safari native HLS
          video.src = fallbackUrl;
        } else {
          // Try loading single variant via Shaka
          if (!player) {
            player = new shaka.Player();
            await player.attach(video);
          }
          await player.load(fallbackUrl);
        }

        loadingEl.style.display = "none";
        video.autoplay = true;
        try { await video.play(); } catch (_) {
          video.muted = true;
          try { await video.play(); } catch (__) {}
        }
      } else {
        showError();
      }
    } catch (_) {
      showError();
    }
  }
}

document.addEventListener("DOMContentLoaded", initializePlayer);
</script>
</body>
</html>
